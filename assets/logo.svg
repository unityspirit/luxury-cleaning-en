<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="glc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4A94B"/>
      <stop offset="100%" stop-color="#b8912f"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="#1a1a2e"/>
  <circle cx="100" cy="100" r="82" fill="none" stroke="url(#glc)" stroke-width="2"/>
  <!-- Diamond / luxury symbol at top -->
  <polygon points="100,35 115,55 100,70 85,55" fill="none" stroke="url(#glc)" stroke-width="2"/>
  <line x1="85" y1="55" x2="115" y2="55" stroke="url(#glc)" stroke-width="1.5"/>
  <line x1="100" y1="35" x2="100" y2="70" stroke="url(#glc)" stroke-width="1"/>
  <!-- Spray bottle -->
  <rect x="82" y="85" width="20" height="45" rx="4" fill="none" stroke="url(#glc)" stroke-width="2.5"/>
  <rect x="88" y="78" width="8" height="10" rx="1" fill="none" stroke="url(#glc)" stroke-width="2"/>
  <!-- Spray nozzle -->
  <path d="M96,78 L108,70 L108,75 L96,82" fill="none" stroke="url(#glc)" stroke-width="2" stroke-linejoin="round"/>
  <!-- Spray droplets -->
  <circle cx="118" cy="65" r="2" fill="url(#glc)" opacity="0.7"/>
  <circle cx="125" cy="60" r="2.5" fill="url(#glc)" opacity="0.5"/>
  <circle cx="120" cy="72" r="1.5" fill="url(#glc)" opacity="0.6"/>
  <!-- Sparkle stars -->
  <polygon points="130,90 132,96 138,96 133,100 135,106 130,102 125,106 127,100 122,96 128,96" fill="url(#glc)" opacity="0.7"/>
  <polygon points="55,85 56,89 60,89 57,91 58,95 55,93 52,95 53,91 50,89 54,89" fill="url(#glc)" opacity="0.5"/>
  <!-- Leaf / eco accent -->
  <path d="M65,130 Q80,115 90,130 Q80,145 65,130Z" fill="url(#glc)" opacity="0.5"/>
  <path d="M135,130 Q120,115 110,130 Q120,145 135,130Z" fill="url(#glc)" opacity="0.5"/>
</svg>
